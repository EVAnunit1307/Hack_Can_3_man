<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video / Image Upload</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>
  <h1>Upload video or image</h1>
  <form id="uploadForm">
    <input type="file" name="file" id="file" accept="video/*,image/*" required>
    <button type="submit">Upload to Cloudinary</button>
  </form>
  <div id="result"></div>

  <div id="story-modal" class="story-modal" role="dialog" aria-modal="true" aria-labelledby="story-modal-title" aria-hidden="true">
    <div class="story-modal__backdrop"></div>
    <div class="story-modal__box">
      <button type="button" class="story-modal__close" aria-label="Close story">×</button>
      <h2 id="story-modal-title" class="story-modal__title"></h2>
      <div class="story-modal__character" id="story-character" aria-hidden="true">
        <div class="story-character__figure">
          <div class="story-character__head"></div>
          <div class="story-character__body"></div>
          <div class="story-character__sound" aria-hidden="true"></div>
        </div>
      </div>
      <p class="story-modal__status" id="story-status">Loading story…</p>
      <audio id="story-audio" class="story-modal__audio" controls></audio>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/render.js"></script>
  <script src="js/generate3d.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/story.js"></script>
</body>
</html>
