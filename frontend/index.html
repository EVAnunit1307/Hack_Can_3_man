<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aki reconnects people with Indigenous food traditions. Upload an ingredient photo to discover traditional names, cultural uses, and recipes from Indigenous Nations.">
  <meta name="theme-color" content="#2D4A35">
  <title>Aki — Indigenous Food Reconnection</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
</head>
<body>

  <header class="site-header">
    <h1>Aki</h1>
    <span class="tagline">Indigenous food reconnection</span>
  </header>

  <main>
    <section class="upload-card" aria-label="Upload ingredient photo">
      <label for="file">Upload an ingredient photo</label>
      <div class="upload-row">
        <input type="file" id="file" name="file" accept="image/*,video/*" required>
        <button class="btn-primary" type="button" id="uploadBtn">Analyse</button>
      </div>
    </section>

    <div id="result" role="region" aria-live="polite" aria-label="Analysis results"></div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/ar.js"></script>
  <script src="js/render.js"></script>
  <script src="js/upload.js"></script>
</body>
</html>
